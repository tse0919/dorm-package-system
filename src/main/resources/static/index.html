<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍包裹代收管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4 text-primary">📦 宿舍包裹代收管理系統</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white"><h5>✨ 新增包裹登記</h5></div>
            <div class="card-body">
                <form id="packageForm" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">學生學號</label>
                        <input type="text" class="form-control" id="studentId" required placeholder="例如：A110XXXX">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">學生姓名</label>
                        <input type="text" class="form-control" id="studentName" required placeholder="例如：王小明">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">物品名稱</label>
                        <input type="text" class="form-control" id="itemName" required placeholder="例如：蝦皮包裹、披薩">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">包裹類型</label>
                        <select class="form-select" id="packageType">
                            <option value="常溫快遞">常溫快遞</option>
                            <option value="低溫冷藏">低溫冷藏</option>
                            <option value="食物外送">食物外送</option>
                        </select>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-success px-4">確認登記</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-secondary text-white"><h5>📋 目前包裹清單</h5></div>
            <div class="card-body">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>學號</th>
                            <th>姓名</th>
                            <th>物品</th>
                            <th>類型</th>
                            <th>狀態</th>
                            <th>備註 (AI自動分析)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="packageTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/packages';

        // 載入所有包裹
        async function loadPackages() {
            const res = await fetch(API_URL);
            const packages = await res.json();
            const tbody = document.getElementById('packageTableBody');
            tbody.innerHTML = '';
            
            packages.forEach(pkg => {
                const isClaimed = pkg.status === '已領取';
                tbody.innerHTML += `
                    <tr>
                        <td>${pkg.id}</td>
                        <td>${pkg.studentId}</td>
                        <td>${pkg.studentName}</td>
                        <td>${pkg.itemName}</td>
                        <td><span class="badge bg-info text-dark">${pkg.packageType}</span></td>
                        <td><span class="badge ${isClaimed ? 'bg-success' : 'bg-warning text-dark'}">${pkg.status}</span></td>
                        <td class="text-danger fw-bold">${pkg.remark || ''}</td>
                        <td>
                            ${isClaimed ? '-' : `<button class="btn btn-sm btn-outline-primary" onclick="claimPackage(${pkg.id})">一鍵領取</button>`}
                        </td>
                    </tr>
                `;
            });
        }

        // 登記新包裹
        document.getElementById('packageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                studentId: document.getElementById('studentId').value,
                studentName: document.getElementById('studentName').value,
                itemName: document.getElementById('itemName').value,
                packageType: document.getElementById('packageType').value
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            document.getElementById('packageForm').reset();
            loadPackages();
        });

        // 領取包裹
        async function claimPackage(id) {
            await fetch(`${API_URL}/${id}/claim`, { method: 'PUT' });
            loadPackages();
        }

        // 初始化載入
        loadPackages();
    </script>
</body>
</html>
